services:

    app:
        build: .
        container_name: laravel-app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - .:/var/www
        networks:
            - laravel

    nginx:
        image: nginx:latest
        container_name: laravel-nginx
        restart: unless-stopped
        ports:
            - "8000:80"
        volumes:
            - .:/var/www
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - laravel

    mysql:
        image: mysql:8
        container_name: laravel-mysql
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: laravel
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - laravel

    redis:
        image: redis:7
        container_name: laravel-redis
        restart: unless-stopped
        networks:
            - laravel

    # queue:
    #     build: .
    #     container_name: laravel-queue
    #     restart: unless-stopped
    #     working_dir: /var/www
    #     command: php artisan queue:work --tries=3 --timeout=90
    #     volumes:
    #         - .:/var/www
    #     depends_on:
    #         - mysql
    #         - redis
    #     networks:
    #         - laravel

    horizon:
        build: .
        container_name: laravel-horizon
        restart: unless-stopped
        working_dir: /var/www
        command: php artisan horizon
        volumes:
            - .:/var/www
        depends_on:
            - redis
            - mysql
        networks:
            - laravel

    scheduler:
        build: .
        container_name: laravel-scheduler
        restart: unless-stopped
        working_dir: /var/www
        command: php artisan schedule:work
        volumes:
            - .:/var/www
        depends_on:
            - mysql
        networks:
            - laravel

volumes:
    mysql_data:

networks:
    laravel:
        driver: bridge
